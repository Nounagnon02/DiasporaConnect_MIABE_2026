<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiasporaConnect - Contact</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/nav.js"></script>
    <style>
        .contact-options {
            padding: var(--spacing-lg);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        .contact-btn {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
            padding: var(--spacing-lg);
            background: var(--surface-lowest);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--on-surface);
            box-shadow: var(--shadow-glass);
            border: 1px solid var(--outline-variant);
        }
    </style>
</head>
<body>
    <div class="mobile-view">
        <div id="dc-nav" data-active="dashboard"></div>
        <header>
            <a href="profile.html" class="back-button">←</a>
            <h3>Support</h3>
            <div style="width: 40px;"></div>
        </header>

        <div style="padding: var(--spacing-lg);">
            <h1>Besoin d'aide ?</h1>
            <p>Notre équipe est disponible 7j/7 pour vous accompagner.</p>
        </div>

        <div class="contact-options fade-in">
            <a href="https://wa.me/22900000000" class="contact-btn">
                <div style="font-size: 32px;">💬</div>
                <div>
                    <div style="font-weight: 700;">WhatsApp Business</div>
                    <p style="font-size: 13px; opacity: 0.7;">Réponse en moins de 10 min</p>
                </div>
            </a>

            <a href="tel:+22900000000" class="contact-btn">
                <div style="font-size: 32px;">📞</div>
                <div>
                    <div style="font-weight: 700;">Appel direct</div>
                    <p style="font-size: 13px; opacity: 0.7;">Disponible de 8h à 20h (GMT+1)</p>
                </div>
            </a>

            <a href="mailto:support@diasporaconnect.bj" class="contact-btn">
                <div style="font-size: 32px;">📧</div>
                <div>
                    <div style="font-weight: 700;">Email</div>
                    <p style="font-size: 13px; opacity: 0.7;">support@diasporaconnect.bj</p>
                </div>
            </a>
        </div>

        <div style="padding: var(--spacing-xl); text-align: center;">
            <p class="label" style="opacity: 0.5;">Version 1.0.0 (Build 2026-MIABE)</p>
        </div>
    </div>
</body>
</html>
