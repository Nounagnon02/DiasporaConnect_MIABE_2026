<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiasporaConnect - Profil</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/nav.js"></script>
    <style>
        .pf-header { padding: var(--spacing-lg) var(--spacing-xl) var(--spacing-sm); }
        .pf-title { font-family: var(--font-display); font-size: 28px; color: var(--on-surface); letter-spacing: -0.56px; }

        .pf-scroll { padding: 0 var(--spacing-xl) 120px; }

        /* Profile card */
        .profile-card {
            background: var(--surface-lowest); border-radius: var(--radius-md);
            padding: var(--spacing-lg); display: flex; flex-direction: column;
            align-items: center; margin-bottom: var(--spacing-xl);
            box-shadow: var(--shadow-diffuse);
        }
        /* Avatar carré border-radius:8px */
        .pf-avatar {
            width: 64px; height: 64px; border-radius: 8px;
            background: var(--surface-low);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: var(--spacing-md);
        }
        .pf-avatar-text { font-family: var(--font-display); font-size: 24px; color: var(--primary); }
        .pf-name {
            font-family: var(--font-display); font-size: 20px; color: var(--on-surface);
            margin-bottom: var(--spacing-md); letter-spacing: -0.4px; text-align: center;
        }
        /* Wallet row */
        .wallet-row {
            display: flex; align-items: center;
            background: var(--surface-low); border-radius: 6px;
            padding: var(--spacing-md); width: 100%;
        }
        .wallet-info { flex: 1; margin-right: var(--spacing-sm); }
        .wallet-label { font-family: var(--font-body); font-size: 11px; color: var(--on-surface-variant); margin-bottom: 2px; }
        .wallet-address { font-family: var(--font-label); font-size: 13px; color: var(--primary); }
        .copy-btn {
            padding: 4px var(--spacing-sm); background: rgba(117,91,0,0.1);
            border-radius: 4px; font-family: var(--font-label); font-size: 12px;
            color: var(--primary); border: none; cursor: pointer; flex-shrink: 0;
        }

        /* Section title */
        .section-title {
            font-family: var(--font-title); font-size: 13px; color: var(--on-surface-variant);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: var(--spacing-sm); margin-top: var(--spacing-lg);
        }

        /* Lang card */
        .lang-card {
            background: var(--surface-lowest); border-radius: var(--radius-md);
            overflow: hidden; box-shadow: var(--shadow-diffuse);
        }
        .lang-row {
            display: flex; align-items: center; padding: var(--spacing-md);
            gap: var(--spacing-md); cursor: pointer;
        }
        .lang-row.active { background: rgba(117,91,0,0.05); }
        .lang-flag { font-size: 20px; flex-shrink: 0; }
        .lang-label { flex: 1; font-family: var(--font-body); font-size: 16px; color: var(--on-surface); }
        .lang-label.active { font-family: var(--font-title); color: var(--primary); }
        .lang-check {
            width: 22px; height: 22px; border-radius: 4px;
            background: var(--primary);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 13px; flex-shrink: 0;
        }

        /* Setting card */
        .setting-card {
            background: var(--surface-lowest); border-radius: var(--radius-md);
            padding: var(--spacing-md); box-shadow: var(--shadow-diffuse);
        }
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: var(--spacing-sm) 0; gap: var(--spacing-sm);
        }
        .setting-row-border { border-top: 1px solid rgba(208,197,178,0.15); }
        .setting-label-row { display: flex; align-items: center; gap: 8px; flex: 1; }
        .setting-label { font-family: var(--font-body); font-size: 15px; color: var(--on-surface); }
        .setting-value { font-family: var(--font-label); font-size: 13px; color: var(--primary); flex-shrink: 0; }
        .setting-value-label { font-family: var(--font-label); font-size: 13px; color: var(--on-surface-variant); flex-shrink: 0; text-align: right; }

        /* Impact btn */
        .impact-btn {
            display: flex; align-items: center; gap: var(--spacing-sm);
            background: rgba(117,91,0,0.06); border-radius: var(--radius-md);
            padding: var(--spacing-lg); margin-top: var(--spacing-lg);
            text-decoration: none;
        }
        .impact-btn-text { font-family: var(--font-title); font-size: 15px; color: var(--primary); flex: 1; }

        /* Logout */
        .logout-btn {
            display: flex; align-items: center; justify-content: center;
            background: var(--surface-low); border-radius: var(--radius-md);
            padding: var(--spacing-md); margin-top: var(--spacing-xl);
            text-decoration: none; gap: 6px;
        }
        .logout-text { font-family: var(--font-title); font-size: 15px; color: var(--on-surface); }
    </style>
</head>
<body>
    <div class="mobile-view">
        <div id="dc-nav" data-active="dashboard"></div>
        <div class="pf-header">
            <div class="pf-title">Profil</div>
        </div>

        <div class="pf-scroll">
            <!-- Profile card -->
            <div class="profile-card">
                <div class="pf-avatar">
                    <span class="pf-avatar-text">K</span>
                </div>
                <div class="pf-name">Kossi</div>
                <div class="wallet-row">
                    <div class="wallet-info">
                        <div class="wallet-label">Portefeuille Celo</div>
                        <div class="wallet-address">0x742d35...3E1f</div>
                    </div>
                    <button class="copy-btn" onclick="this.textContent='✓';setTimeout(()=>this.textContent='Copier',2000)">Copier</button>
                </div>
            </div>

            <!-- Langue -->
            <div class="section-title">Langue</div>
            <div class="lang-card">
                <div class="lang-row active" onclick="selectLang(this)">
                    <span class="lang-flag">🇫🇷</span>
                    <span class="lang-label active">Français</span>
                    <div class="lang-check">✓</div>
                </div>
                <div class="lang-row" onclick="selectLang(this)">
                    <span class="lang-flag">🇬🇧</span>
                    <span class="lang-label">English</span>
                </div>
                <div class="lang-row" onclick="selectLang(this)">
                    <span class="lang-flag">🇧🇯</span>
                    <span class="lang-label">Fon</span>
                </div>
            </div>

            <!-- Sécurité -->
            <div class="section-title">Sécurité</div>
            <div class="setting-card">
                <div class="setting-row">
                    <div class="setting-label-row">
                        <span style="font-size:16px;">👆</span>
                        <span class="setting-label">Authentification biométrique</span>
                    </div>
                    <span class="setting-value">Activée</span>
                </div>
            </div>

            <!-- Impact -->
            <a href="impact.html" class="impact-btn">
                <span style="font-size:18px;">🌍</span>
                <span class="impact-btn-text">Voir notre impact ODD</span>
                <span style="color:var(--primary);font-size:18px;">›</span>
            </a>

            <!-- À propos -->
            <div class="section-title">À propos</div>
            <div class="setting-card">
                <div class="setting-row">
                    <span class="setting-label">Version</span>
                    <span class="setting-value-label">1.0.0 — MIABE 2026</span>
                </div>
                <div class="setting-row setting-row-border">
                    <span class="setting-label">Réseau</span>
                    <span class="setting-value-label">Celo Alfajores</span>
                </div>
            </div>

            <!-- Déconnexion -->
            <button type="button" class="logout-btn" onclick="confirmLogout()">
                <span style="font-size:16px;">🚪</span>
                <span class="logout-text">Déconnecter le wallet</span>
            </button>
        </div>
    </div>
    <script>
        function confirmLogout() {
            if (confirm('Voulez-vous vous déconnecter ?')) {
                window.location.href = 'role-selection.html';
            }
        }

        function selectLang(el) {
            document.querySelectorAll('.lang-row').forEach(r => {
                r.classList.remove('active');
                r.querySelector('.lang-label').classList.remove('active');
                const chk = r.querySelector('.lang-check');
                if (chk) chk.remove();
            });
            el.classList.add('active');
            el.querySelector('.lang-label').classList.add('active');
            const chk = document.createElement('div');
            chk.className = 'lang-check'; chk.textContent = '✓';
            el.appendChild(chk);
        }
    </script>
</body>
</html>
