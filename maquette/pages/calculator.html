<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiasporaConnect - Estimer un transfert</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/nav.js"></script>
    <style>
        .calc-header { padding: var(--spacing-lg) var(--spacing-xl) var(--spacing-md); }
        .calc-title { font-family: var(--font-display); font-size: 28px; color: var(--on-surface); letter-spacing: -0.02em; }
        .calc-scroll { padding: 0 var(--spacing-xl); padding-bottom: 120px; }

        /* Input card */
        .input-card {
            background: var(--surface-lowest); border-radius: var(--radius-md);
            padding: var(--spacing-lg); margin-bottom: var(--spacing-xl);
            box-shadow: var(--shadow-diffuse);
        }

        /* Toggle devise */
        .currency-toggle {
            display: flex; margin-bottom: var(--spacing-lg);
            background: var(--surface-low); border-radius: var(--radius-sm); padding: 4px;
        }
        .toggle-btn {
            flex: 1; padding: 8px; text-align: center; border-radius: 2px;
            font-family: var(--font-title); font-size: 14px; color: var(--on-surface-variant);
            cursor: pointer; border: none; background: transparent; transition: all 0.2s;
        }
        .toggle-btn.active {
            background: var(--surface-lowest); color: var(--primary);
            box-shadow: var(--shadow-glass);
        }

        /* LedgerInput */
        .ledger-label { font-family: var(--font-body); font-size: 13px; color: var(--on-surface-variant); margin-bottom: 6px; display: block; }
        .ledger-input {
            width: 100%; padding: var(--spacing-md);
            border: none; border-bottom: 2px solid rgba(208,197,178,0.4);
            background: transparent;
            font-family: var(--font-label); font-size: 20px; color: var(--on-surface);
        }
        .ledger-input:focus { outline: none; border-bottom-color: var(--primary); }

        /* Result */
        .result-container {
            margin-top: var(--spacing-md); padding-top: var(--spacing-md);
            border-top: 1px solid rgba(208,197,178,0.2);
        }
        .result-label { font-family: var(--font-body); font-size: 13px; color: var(--on-surface-variant); margin-bottom: 4px; }
        .result-amount {
            font-family: var(--font-label); font-size: clamp(20px, 7vw, 32px);
            color: var(--on-surface); letter-spacing: -0.64px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Fee comparator */
        .fee-comp {
            background: var(--surface-lowest); border-radius: var(--radius-md);
            padding: var(--spacing-lg); margin-bottom: var(--spacing-xl);
            box-shadow: var(--shadow-diffuse);
        }
        .fee-comp-title { font-family: var(--font-label); font-size: 11px; color: var(--on-surface-variant); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: var(--spacing-md); }
        .fee-row { display: flex; align-items: center; margin-bottom: var(--spacing-sm); gap: var(--spacing-sm); }
        .fee-row-label { font-family: var(--font-label); font-size: 12px; color: var(--on-surface-variant); width: 32px; flex-shrink: 0; }
        .fee-bar-track { flex: 1; height: 8px; background: var(--surface-low); border-radius: 4px; overflow: hidden; }
        .fee-bar-fill { height: 100%; border-radius: 4px; }
        .fee-row-pct { font-family: var(--font-label); font-size: 12px; color: var(--on-surface-variant); width: 36px; text-align: right; flex-shrink: 0; }
        .fee-row-pct.gold { color: var(--primary); font-weight: 700; }

        /* Savings banner */
        .savings-banner {
            display: flex; align-items: flex-start;
            background: var(--surface-low); padding: var(--spacing-lg);
            border-radius: var(--radius-md); gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }
        .savings-icon { font-size: 22px; flex-shrink: 0; }
        .savings-text { flex: 1; font-family: var(--font-body); font-size: 13px; color: var(--on-surface-variant); line-height: 20px; }
        .savings-bold { font-family: var(--font-title); color: var(--primary); }

        /* CTA flottant */
        .bottom-cta {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 430px;
            padding: var(--spacing-lg) var(--spacing-xl);
            padding-bottom: max(40px, env(safe-area-inset-bottom, 16px));
            background: rgba(250,249,245,0.95);
            border-top: 1px solid rgba(208,197,178,0.15);
        }
    </style>
</head>
<body>
    <div class="mobile-view">
        <div id="dc-nav" data-active="send"></div>
        <div class="calc-header">
            <div class="calc-title">Estimer un transfert</div>
        </div>

        <div class="calc-scroll">
            <!-- Input Card -->
            <div class="input-card">
                <div class="currency-toggle">
                    <button class="toggle-btn active" id="btnEUR" onclick="setCurrency('EUR')">EUR</button>
                    <button class="toggle-btn" id="btnUSD" onclick="setCurrency('USD')">USD</button>
                </div>

                <label class="ledger-label">Montant de l'expédition</label>
                <input class="ledger-input" type="number" id="amountInput" value="200" oninput="calculate()">

                <div class="result-container">
                    <div class="result-label">Le bénéficiaire reçoit environ</div>
                    <div class="result-amount" id="resultFCFA">121 975 FCFA</div>
                </div>
            </div>

            <!-- Fee Comparator -->
            <div class="fee-comp" id="feeComp">
                <div class="fee-comp-title">Comparaison des frais</div>
                <div class="fee-row">
                    <span class="fee-row-label">WU</span>
                    <div class="fee-bar-track"><div class="fee-bar-fill" style="width:100%;background:#C0392B;opacity:0.55;"></div></div>
                    <span class="fee-row-pct">14 %</span>
                </div>
                <div class="fee-row">
                    <span class="fee-row-label">MG</span>
                    <div class="fee-bar-track"><div class="fee-bar-fill" style="width:78%;background:#E67E22;opacity:0.55;"></div></div>
                    <span class="fee-row-pct">11 %</span>
                </div>
                <div class="fee-row">
                    <span class="fee-row-label">WR</span>
                    <div class="fee-bar-track"><div class="fee-bar-fill" style="width:50%;background:#F39C12;opacity:0.55;"></div></div>
                    <span class="fee-row-pct">7 %</span>
                </div>
                <div class="fee-row">
                    <span class="fee-row-label" style="color:var(--primary);font-weight:700;">DC</span>
                    <div class="fee-bar-track"><div class="fee-bar-fill" style="width:6%;background:var(--primary);"></div></div>
                    <span class="fee-row-pct gold">&lt; 1 %</span>
                </div>
            </div>

            <!-- Savings Banner -->
            <div class="savings-banner" id="savingsBanner">
                <span class="savings-icon">✨</span>
                <span class="savings-text">
                    En envoyant avec DiasporaConnect, vous conservez
                    <span class="savings-bold" id="savingsAmt">26.20 USD</span>
                    dans la famille vs. le marché.
                </span>
            </div>
        </div>

        <!-- CTA flottant -->
        <div class="bottom-cta">
            <a href="send-step2.html" class="btn btn-primary">Continuer le transfert</a>
        </div>
    </div>

    <script>
        let currency = 'EUR';
        const EUR_TO_USD = 1.09;
        const USD_TO_FCFA = 612.5;
        const DC_FEE_PCT = 0.008;
        const WU_FEE_PCT = 0.14;

        function setCurrency(cur) {
            currency = cur;
            document.getElementById('btnEUR').classList.toggle('active', cur === 'EUR');
            document.getElementById('btnUSD').classList.toggle('active', cur === 'USD');
            calculate();
        }

        function calculate() {
            const raw = parseFloat(document.getElementById('amountInput').value) || 0;
            const amountUSD = currency === 'EUR' ? raw * EUR_TO_USD : raw;
            const fee = amountUSD * DC_FEE_PCT;
            const recipientUSD = amountUSD - fee;
            const recipientFCFA = Math.round(recipientUSD * USD_TO_FCFA);
            const savings = amountUSD * WU_FEE_PCT - fee;

            document.getElementById('resultFCFA').textContent =
                new Intl.NumberFormat('fr-FR').format(recipientFCFA) + ' FCFA';
            document.getElementById('savingsAmt').textContent =
                savings.toFixed(2) + ' USD';
        }

        calculate();
    </script>
</body>
</html>
