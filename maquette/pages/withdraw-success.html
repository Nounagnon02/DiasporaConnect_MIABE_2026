<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiasporaConnect - Retrait en cours</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/nav.js"></script>
    <style>
        .ws-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: var(--spacing-xl);
        }

        /* Icône succès — cercle var(--primary) */
        .success-icon-wrap {
            width: 100px; height: 100px; border-radius: 50%;
            background: var(--primary);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: var(--spacing-xxl);
            box-shadow: var(--shadow-diffuse);
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .success-icon-text { font-size: 52px; color: #fff; line-height: 1; }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .text-block { width: 100%; display: flex; flex-direction: column; align-items: center; animation: fadeUp 0.6s ease 0.3s both; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .success-title {
            font-family: var(--font-display); font-size: 32px; color: var(--on-surface);
            letter-spacing: -0.02em; margin-bottom: var(--spacing-sm); text-align: center;
        }
        .success-status {
            font-family: var(--font-headline); font-size: 17px; color: var(--on-surface-variant);
            margin-bottom: var(--spacing-xl); text-align: center;
        }

        /* Box explicatif */
        .info-box {
            background: var(--surface); padding: var(--spacing-lg);
            border-radius: var(--radius-md); width: 100%; margin-bottom: var(--spacing-xl);
        }
        .info-box-text {
            font-family: var(--font-body); font-size: 14px; color: var(--on-surface-variant);
            text-align: center; line-height: 22px;
        }

        /* Trust row */
        .trust-row { display: flex; gap: var(--spacing-lg); justify-content: center; }
        .trust-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .trust-icon-wrap {
            width: 40px; height: 40px; border-radius: 20px;
            background: rgba(117,91,0,0.08);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .trust-label { font-family: var(--font-label); font-size: 11px; color: var(--on-surface-variant); }

        /* Footer */
        .ws-footer {
            padding: var(--spacing-lg) var(--spacing-xl) var(--spacing-xl);
            background: var(--surface-lowest);
        }
    </style>
</head>
<body>
    <div class="mobile-view" style="background:var(--surface-lowest);display:flex;flex-direction:column;height:100vh;">
        <div id="dc-nav" data-active="receive"></div>
        <div class="ws-container">
            <div class="success-icon-wrap">
                <span class="success-icon-text">✓</span>
            </div>

            <div class="text-block">
                <div class="success-title">Retrait en cours</div>
                <div class="success-status">Délai estimé : moins de 2 minutes</div>

                <div class="info-box">
                    <div class="info-box-text">Votre compte Mobile Money sera crédité dès que le réseau aura validé la sortie des fonds du Private Ledger.</div>
                </div>

                <div class="trust-row">
                    <div class="trust-item">
                        <div class="trust-icon-wrap">⚡</div>
                        <span class="trust-label">Instantané</span>
                    </div>
                    <div class="trust-item">
                        <div class="trust-icon-wrap">🔒</div>
                        <span class="trust-label">Sécurisé</span>
                    </div>
                    <div class="trust-item">
                        <div class="trust-icon-wrap">💵</div>
                        <span class="trust-label">Sans frais</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="ws-footer">
            <a href="home-receiver.html" class="btn btn-primary">Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>
