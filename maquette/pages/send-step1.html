<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiasporaConnect - Initialisation</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/nav.js"></script>
    <style>
        .s1-header {
            padding: var(--spacing-lg) var(--spacing-xl) var(--spacing-sm);
            display: flex; justify-content: center;
        }
        .s1-header-title { font-family: var(--font-title); font-size: 16px; color: var(--on-surface); }

        .step-indicator {
            display: flex; align-items: center;
            padding: 0 var(--spacing-xl) var(--spacing-md);
        }
        .step-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .step-dot {
            width: 24px; height: 24px; border-radius: 50%;
            background: var(--surface-low); border: 2px solid rgba(208,197,178,0.4);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-label); font-size: 11px; color: var(--on-surface-variant);
            margin-bottom: 4px;
        }
        .step-dot.active { border-color: var(--primary); color: var(--primary); background: rgba(117,91,0,0.08); }
        .step-label { font-family: var(--font-label); font-size: 10px; color: var(--on-surface-variant); text-align: center; }
        .step-label.active { color: var(--primary); }
        .step-line { flex: 1; height: 2px; background: rgba(208,197,178,0.3); margin-bottom: 18px; }

        .s1-body {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: var(--spacing-md);
        }
        /* Spinner */
        .spinner {
            width: 40px; height: 40px; border-radius: 50%;
            border: 3px solid rgba(117,91,0,0.15);
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .s1-text { font-family: var(--font-body); color: var(--on-surface-variant); }
    </style>
</head>
<body>
    <div class="mobile-view" style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">
        <div id="dc-nav" data-active="send"></div>
        <div class="s1-header">
            <span class="s1-header-title">Initialisation</span>
        </div>

        <div class="step-indicator">
            <div class="step-item">
                <div class="step-dot active">1</div>
                <span class="step-label active">Montant</span>
            </div>
            <div class="step-line"></div>
            <div class="step-item">
                <div class="step-dot">2</div>
                <span class="step-label">Destinataire</span>
            </div>
            <div class="step-line"></div>
            <div class="step-item">
                <div class="step-dot">3</div>
                <span class="step-label">Confirmation</span>
            </div>
            <div class="step-line"></div>
            <div class="step-item">
                <div class="step-dot">4</div>
                <span class="step-label">Succès</span>
            </div>
        </div>

        <div class="s1-body">
            <div class="spinner"></div>
            <span class="s1-text">Préparation de l'envoi...</span>
        </div>
    </div>

    <script>
        setTimeout(() => { window.location.href = 'send-step2.html'; }, 1000);
    </script>
</body>
</html>
