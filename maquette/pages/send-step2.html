<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiasporaConnect - Destinataire</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/nav.js"></script>
    <style>
        .step-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: var(--spacing-lg) var(--spacing-xl) var(--spacing-sm);
        }
        .step-back { font-size: 24px; color: var(--primary); text-decoration: none; }
        .step-title { font-family: var(--font-title); font-size: 16px; color: var(--on-surface); }

        /* Step Indicator */
        .step-indicator {
            display: flex; align-items: center;
            padding: 0 var(--spacing-xl) var(--spacing-md);
            gap: 0;
        }
        .step-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .step-dot {
            width: 24px; height: 24px; border-radius: 50%;
            background: var(--surface-low); border: 2px solid rgba(208,197,178,0.4);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-label); font-size: 11px; color: var(--on-surface-variant);
            margin-bottom: 4px;
        }
        .step-dot.done { background: var(--primary); border-color: var(--primary); color: #fff; }
        .step-dot.active { border-color: var(--primary); color: var(--primary); background: rgba(117,91,0,0.08); }
        .step-label { font-family: var(--font-label); font-size: 10px; color: var(--on-surface-variant); text-align: center; }
        .step-label.active { color: var(--primary); }
        .step-line { flex: 1; height: 2px; background: rgba(208,197,178,0.3); margin-bottom: 18px; }
        .step-line.done { background: var(--primary); opacity: 0.4; }

        .step-scroll { padding: var(--spacing-lg) var(--spacing-xl); padding-bottom: 120px; }

        /* Input card */
        .input-card {
            background: var(--surface-lowest); padding: var(--spacing-lg);
            border-radius: var(--radius-md); margin-bottom: var(--spacing-xl);
            box-shadow: var(--shadow-diffuse);
        }
        .ledger-label { font-family: var(--font-body); font-size: 13px; color: var(--on-surface-variant); margin-bottom: 6px; display: block; }
        .ledger-input {
            width: 100%; padding: var(--spacing-md);
            border: none; border-bottom: 2px solid rgba(208,197,178,0.4);
            background: transparent;
            font-family: var(--font-label); font-size: 16px; color: var(--on-surface);
        }
        .ledger-input:focus { outline: none; border-bottom-color: var(--primary); }
        .btn-secondary {
            display: flex; align-items: center; justify-content: center;
            margin-top: var(--spacing-md); padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid rgba(208,197,178,0.4); border-radius: var(--radius-md);
            background: transparent; font-family: var(--font-title); font-size: 14px;
            color: var(--primary); cursor: pointer; width: 100%;
        }

        /* Section label */
        .section-label { font-family: var(--font-title); font-size: 16px; color: var(--on-surface); margin-bottom: var(--spacing-md); }

        /* Contact cards */
        .contact-card {
            display: flex; align-items: center;
            background: var(--surface-low); padding: var(--spacing-md);
            border-radius: var(--radius-md); margin-bottom: var(--spacing-sm);
            border: 1.5px solid transparent; cursor: pointer; transition: all 0.2s;
        }
        .contact-card.selected {
            border-color: rgba(117,91,0,0.3); background: var(--surface-lowest);
        }
        .contact-avatar {
            width: 44px; height: 44px; border-radius: var(--radius-round);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-title); font-size: 15px;
            margin-right: var(--spacing-md); flex-shrink: 0;
        }
        .contact-info { flex: 1; margin-right: var(--spacing-sm); }
        .contact-name { font-family: var(--font-body); font-size: 15px; color: var(--on-surface); margin-bottom: 2px; }
        .contact-phone { font-family: var(--font-label); font-size: 12px; color: var(--on-surface-variant); }
        .selected-badge {
            width: 24px; height: 24px; border-radius: var(--radius-round);
            background: var(--primary); display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 13px; flex-shrink: 0;
        }

        /* Footer */
        .step-footer {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 430px;
            padding: var(--spacing-lg) var(--spacing-xl) var(--spacing-xl);
            background: var(--surface);
            border-top: 1px solid rgba(208,197,178,0.2);
        }
    </style>
</head>
<body>
    <div class="mobile-view">
        <div id="dc-nav" data-active="send"></div>
        <!-- Header -->
        <div class="step-header">
            <a href="calculator.html" class="step-back">←</a>
            <span class="step-title">Destinataire</span>
            <div style="width:40px;"></div>
        </div>

        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step-item">
                <div class="step-dot done">✓</div>
                <span class="step-label">Montant</span>
            </div>
            <div class="step-line done"></div>
            <div class="step-item">
                <div class="step-dot active">2</div>
                <span class="step-label active">Destinataire</span>
            </div>
            <div class="step-line"></div>
            <div class="step-item">
                <div class="step-dot">3</div>
                <span class="step-label">Confirmation</span>
            </div>
            <div class="step-line"></div>
            <div class="step-item">
                <div class="step-dot">4</div>
                <span class="step-label">Succès</span>
            </div>
        </div>

        <div class="step-scroll">
            <!-- Input -->
            <div class="input-card">
                <label class="ledger-label">Numéro Mobile Money (+229)</label>
                <input class="ledger-input" type="tel" id="phoneInput" placeholder="97 00 00 00">
                <button class="btn-secondary">Scanner QR Code</button>
            </div>

            <!-- Contacts récents -->
            <div class="section-label">Destinataires récents</div>

            <div class="contact-card selected" onclick="selectContact(this, '+229 97 12 34 56')">
                <div class="contact-avatar" style="background:rgba(117,91,0,0.12);color:#755B00;">FA</div>
                <div class="contact-info">
                    <div class="contact-name">Fatou Amoussou</div>
                    <div class="contact-phone">+229 97 12 34 56 · MTN</div>
                </div>
                <div class="selected-badge">✓</div>
            </div>

            <div class="contact-card" onclick="selectContact(this, '+229 96 78 90 12')">
                <div class="contact-avatar" style="background:rgba(0,91,187,0.1);color:#005BBB;">KD</div>
                <div class="contact-info">
                    <div class="contact-name">Kofi Dossou</div>
                    <div class="contact-phone">+229 96 78 90 12 · Moov</div>
                </div>
            </div>

            <div class="contact-card" onclick="selectContact(this, '+229 97 55 66 77')">
                <div class="contact-avatar" style="background:rgba(117,91,0,0.08);color:#755B00;">SA</div>
                <div class="contact-info">
                    <div class="contact-name">Séraphin Adjovi</div>
                    <div class="contact-phone">+229 97 55 66 77 · MTN</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="step-footer">
            <a href="send-step3.html" class="btn btn-primary">Continuer</a>
        </div>
    </div>

    <script>
        function selectContact(el, phone) {
            document.querySelectorAll('.contact-card').forEach(c => {
                c.classList.remove('selected');
                const badge = c.querySelector('.selected-badge');
                if (badge) badge.remove();
            });
            el.classList.add('selected');
            const badge = document.createElement('div');
            badge.className = 'selected-badge';
            badge.textContent = '✓';
            el.appendChild(badge);
            document.getElementById('phoneInput').value = phone;
        }
    </script>
</body>
</html>
