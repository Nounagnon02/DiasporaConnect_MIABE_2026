<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiasporaConnect - Splash</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/nav.js"></script>
    <style>
        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: linear-gradient(180deg, #6B4F00 0%, #8B6800 30%, #C9A020 70%, #E8B800 100%);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .bg-circle-1 {
            position: absolute;
            width: 120vw; height: 120vw;
            max-width: 516px; max-height: 516px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            top: -40vw;
        }
        .bg-circle-2 {
            position: absolute;
            width: 80vw; height: 80vw;
            max-width: 344px; max-height: 344px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            bottom: -20vw;
        }
        .logo-card {
            width: 160px; height: 160px;
            border-radius: 28px;
            background: #FFFFFF;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            margin-bottom: 32px;
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
        }
        .logo-card-text {
            font-family: var(--font-display);
            font-size: 48px;
            color: var(--primary);
            font-weight: 700;
        }
        .splash-title {
            font-family: var(--font-display);
            font-size: 30px;
            color: #FFFFFF;
            letter-spacing: -0.3px;
            font-weight: 700;
            margin-bottom: 8px;
            animation: fadeUp 0.4s ease 0.7s both;
        }
        .splash-tagline {
            font-family: var(--font-label);
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 48px;
            animation: fadeUp 0.4s ease 1.1s both;
        }
        .loading-dots {
            display: flex;
            gap: 6px;
            margin-top: 32px;
            animation: fadeUp 0.4s ease 1.1s both;
        }
        .dot {
            width: 6px; height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.5);
        }
        .dot.mid { background: rgba(255,255,255,0.9); }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.85); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="mobile-view">
        <div id="dc-nav" data-active="home"></div>
        <div class="splash-container">
            <div class="bg-circle-1"></div>
            <div class="bg-circle-2"></div>
            <div class="logo-card">
                <span class="logo-card-text">DC</span>
            </div>
            <div class="splash-title">DiasporaConnect</div>
            <div class="splash-tagline">The Private Ledger</div>
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot mid"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
    <script>
        setTimeout(() => { window.location.href = 'onboarding.html'; }, 3000);
    </script>
</body>
</html>
